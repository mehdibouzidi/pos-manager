application.version=1.0.0-SNAPSHOT

spring.application.name=pos-manager

## Server
server.tomcat.connection-timeout=20000

## Database
spring.datasource.url=jdbc:postgresql://localhost/pos-db
spring.datasource.username=posadmin
spring.datasource.password=MyPOS-2026
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto = none
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


## LIQUIBASE
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/master_changelog.xml
spring.liquibase.liquibaseSchema=public
spring.liquibase.defaultSchema=public

## SECURITY
spring.security.enabled=false


## Files Constraints
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1

# FOR LOB
spring.datasource.hikari.auto-commit=false

## Security Properties
app.jwtSecret= 0c39d00e9282b83a79e6ee04a6a4d0a79f77222a3a8c2f0ee6c54c638e29c478
app.jwtExpirationInMs = 86400000
logging.level.org.springframework.security=INFO

# LOGS
# Set the root log level
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.mystore.manager.api=INFO


management.security.enabled=false
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.endpoint.shutdown.enabled=true
management.endpoint.info.enabled=true
management.endpoint.info.env.enabled=true
management.endpoints.web.exposure.include=*
management.prometheus.metrics.export.enabled=true

# Session and Async Configuration
server.servlet.session.timeout=5m
spring.mvc.async.request-timeout=300000




